<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, user-scalable=no, viewport-fit=cover">
    <title>Чаты Команд</title>
    <!-- Подключаем стили VKUI -->
    <link rel="stylesheet" href="https://unpkg.com/@vkontakte/vkui@5.0.0/dist/vkui.css">
    <style>
        body { background-color: var(--vkui--color_background_content); }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Две колонки */
            gap: 12px;
            padding: 12px;
        }
        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
        }
        .card img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
        }
        .card-title {
            padding: 8px;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="grid" id="container">
            <!-- Тут появятся карточки -->
            <p>Загрузка чатов...</p>
        </div>
    </div>

    <!-- Библиотека VK Bridge для взаимодействия с VK -->
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>

    <script>
        // 1. Инициализация VK
        vkBridge.send("VKWebAppInit");

        // 2. ТВОЯ ССЫЛКА из Google Apps Script
        const API_URL = 'https://script.google.com/macros/s/AKfycbzq6I0MJW5hmWRP0QUI4om6kE9vxMNwUEIFp1-t_mBdiNb407KGysSO-wMFr70gdBhn/exec';

        async function loadChats() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                const container = document.getElementById('container');
                container.innerHTML = ''; // Очистить текст загрузки

                data.forEach(chat => {
                    // Создаем плитку
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${chat.image}" alt="${chat.title}">
                        <div class="card-title">${chat.title}</div>
                    `;
                    
                    // Клик по плитке
                    card.onclick = () => {
                        vkBridge.send("VKWebAppOpenExternalLink", {"url": chat.link});
                    };

                    container.appendChild(card);
                });
            } catch (e) {
                document.getElementById('container').innerHTML = 'Ошибка загрузки данных';
            }
        }

        loadChats();
    </script>
</body>
</html>
